<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cloudflare Workers AI — ハンズオン</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --border: #2a2d3a;
    --accent: #f6821f;
    --accent2: #faad3f;
    --text: #e8e9ed;
    --muted: #6b7280;
    --green: #22c55e;
    --red: #ef4444;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .cf-logo {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 700;
    color: white;
    font-family: var(--mono);
    flex-shrink: 0;
  }

  header h1 {
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.02em;
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
    margin-left: auto;
  }

  main {
    max-width: 800px;
    width: 100%;
    margin: 0 auto;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 1.25rem 1.5rem;
  }

  .card label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.6rem;
  }

  .model-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
  }

  .model-btn {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, background 0.15s;
    color: var(--text);
    font-family: var(--mono);
  }

  .model-btn:hover {
    border-color: var(--accent);
    background: #1f2130;
  }

  .model-btn.active {
    border-color: var(--accent);
    background: rgba(246, 130, 31, 0.1);
  }

  .model-name {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
  }

  .model-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 3px;
  }

  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: vertical;
    min-height: 100px;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus {
    border-color: var(--accent);
  }

  .btn-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  button.submit {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: opacity 0.15s;
  }

  button.submit:hover { opacity: 0.85; }
  button.submit:disabled { opacity: 0.4; cursor: not-allowed; }

  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-left: auto;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 11px;
    color: var(--muted);
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }

  .preset-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .result-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .result-model {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent2);
    background: rgba(250, 173, 63, 0.1);
    border: 1px solid rgba(250, 173, 63, 0.2);
    padding: 2px 8px;
    border-radius: 4px;
  }

  .result-time {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--green);
    margin-left: auto;
  }

  .result-body {
    font-size: 14px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .loading {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
    font-family: var(--mono);
  }

  .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }

  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  .error { color: var(--red); font-size: 13px; font-family: var(--mono); }

  .url-input {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .url-input input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
  }

  .url-input input:focus {
    border-color: var(--accent);
    color: var(--text);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 0.75rem 2rem;
    text-align: center;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
  }

  @media (max-width: 600px) {
    .model-grid { grid-template-columns: 1fr; }
    main { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="cf-logo">CF</div>
  <h1>Workers AI ハンズオン</h1>
  <span>LLM 比較デモ</span>
</header>

<main>

  <!-- Worker URL 設定 -->
  <div class="card">
    <label>Worker URL</label>
    <div class="url-input">
      <input type="text" id="workerUrl" value="http://localhost:8787" placeholder="https://cf-ai-handson.your-name.workers.dev">
    </div>
  </div>

  <!-- モデル選択 -->
  <div class="card">
    <label>モデル選択</label>
    <div class="model-grid" id="modelGrid">
      <button class="model-btn active" data-model="@cf/meta/llama-3.1-8b-instruct-fp8-fast">
        <div class="model-name">Llama 3.1 8B fp8-fast</div>
        <div class="model-meta">Meta · 速度重視 · おすすめ</div>
      </button>
      <button class="model-btn" data-model="@cf/meta/llama-3.1-8b-instruct-fp8">
        <div class="model-name">Llama 3.1 8B fp8</div>
        <div class="model-meta">Meta · FP8量子化 · 比較用</div>
      </button>
      <button class="model-btn" data-model="@cf/meta/llama-3.2-3b-instruct">
        <div class="model-name">Llama 3.2 3B</div>
        <div class="model-meta">Meta · 軽量 · コスパ良</div>
      </button>
      <button class="model-btn" data-model="@cf/ibm-granite/granite-4.0-h-micro">
        <div class="model-name">Granite 4.0 h-micro</div>
        <div class="model-meta">IBM · 最安ニューロン消費</div>
      </button>
    </div>
  </div>

  <!-- プロンプト入力 -->
  <div class="card">
    <label>プロンプト</label>
    <textarea id="prompt" placeholder="質問を入力してください...">Cloudflareとは何ですか？3行で教えてください。</textarea>
    <div class="btn-row" style="margin-top: 12px;">
      <button class="submit" id="sendBtn" onclick="generate()">送信</button>
      <div class="presets">
        <button class="preset-btn" onclick="setPrompt('Cloudflareとは何ですか？3行で教えてください。')">Cloudflareとは</button>
        <button class="preset-btn" onclick="setPrompt('エッジコンピューティングの利点を教えてください。')">エッジとは</button>
        <button class="preset-btn" onclick="setPrompt('Hello! Tell me a fun fact about the internet.')">英語で質問</button>
        <button class="preset-btn" onclick="setPrompt('次のコードをTypeScriptで書き直してください：\nfunction add(a, b) { return a + b; }')">コード変換</button>
      </div>
    </div>
  </div>

  <!-- レスポンス表示 -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="result-header">
      <span class="result-model" id="resultModel"></span>
      <span class="result-time" id="resultTime"></span>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</main>

<footer>Cloudflare Workers AI — 1日10,000ニューロン無料 / Text Generation: 300 req/min</footer>

<script>
let selectedModel = '@cf/meta/llama-3.1-8b-instruct-fp8-fast';

document.querySelectorAll('.model-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedModel = btn.dataset.model;
  });
});

function setPrompt(text) {
  document.getElementById('prompt').value = text;
}

async function generate() {
  const prompt = document.getElementById('prompt').value.trim();
  if (!prompt) return;

  const workerUrl = document.getElementById('workerUrl').value.trim().replace(/\/$/, '');
  const btn = document.getElementById('sendBtn');
  const card = document.getElementById('resultCard');
  const body = document.getElementById('resultBody');

  btn.disabled = true;
  card.style.display = 'block';
  document.getElementById('resultModel').textContent = selectedModel;
  document.getElementById('resultTime').textContent = '';
  body.innerHTML = '<div class="loading"><div class="dot"></div><div class="dot"></div><div class="dot"></div><span>生成中...</span></div>';

  try {
    const res = await fetch(`${workerUrl}/generate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, model: selectedModel }),
    });

    const data = await res.json();

    if (data.error) {
      body.innerHTML = `<span class="error">エラー: ${data.error}</span>`;
    } else {
      document.getElementById('resultTime').textContent = `${data.elapsed_ms}ms`;
      body.textContent = data.response;
    }
  } catch (e) {
    body.innerHTML = `<span class="error">接続エラー: ${e.message}<br>Worker URLを確認してください。</span>`;
  } finally {
    btn.disabled = false;
  }
}

document.getElementById('prompt').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) generate();
});
</script>
</body>
</html>
